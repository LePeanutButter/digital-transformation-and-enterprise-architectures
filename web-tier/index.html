<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure App - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Secure Application</h1>
            <p class="subtitle">Arquitectura segura con Apache + Spring</p>
        </header>

        <main>
            <!-- Vista: Login -->
            <section id="login-section" class="card">
                <h2>Iniciar sesión</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Usuario</label>
                        <input type="text" id="login-username" name="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" name="password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </form>
                <p class="toggle-text">¿No tienes cuenta? <a href="#" id="show-register">Regístrate</a></p>
            </section>

            <!-- Vista: Registro -->
            <section id="register-section" class="card">
                <h2>Registrarse</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label for="register-username">Usuario</label>
                        <input type="text" id="register-username" name="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Contraseña</label>
                        <input type="password" id="register-password" name="password" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-secondary">Crear cuenta</button>
                </form>
                <p class="toggle-text">¿Ya tienes cuenta? <a href="#" id="show-login">Inicia sesión</a></p>
            </section>

            <!-- Vista: Usuario autenticado -->
            <section id="dashboard-section" class="card hidden">
                <h2>Bienvenido</h2>
                <p id="welcome-message">Cargando...</p>
                <button id="logout-btn" class="btn btn-outline">Cerrar sesión</button>
            </section>

            <!-- Mensajes de estado -->
            <div id="message" class="message hidden" role="alert"></div>
        </main>

        <footer>
            <p>Desplegado en AWS · TLS con Let's Encrypt · Contraseñas con hash BCrypt</p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
